security:
  providers:
    jwt:
      lexik_jwt:
        class: App\Security\JwtUser

  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false

    health:
      pattern: ^/notification/health$
      security: false

    api:
      pattern: ^/notification/
      stateless: true
      provider: jwt
      jwt: ~

  access_control:
    - { path: ^/notification/health, roles: PUBLIC_ACCESS }
    - { path: ^/notification/docs(?:\.json)?$, roles: PUBLIC_ACCESS }
    - { path: ^/notification/internal, roles: PUBLIC_ACCESS }
    - {
        path: ^/notification/settings,
        methods: [GET, PUT, PATCH],
        allow_if: "user and 'settings.view' in user.getPermissions()",
      }
    - {
        path: ^/notification/inbox,
        methods: [GET, PATCH, DELETE],
        roles: ROLE_USER,
      }
    - { path: ^/notification, roles: ROLE_USER }
