nelmio_api_doc:
  documentation:
    info:
      title: Notification Service API
      description: Inbox notifications, notification templates, internal notification commands, and health endpoints.
      version: 1.0.0
    components:
      securitySchemes:
        bearerAuth:
          type: http
          scheme: bearer
          bearerFormat: JWT
    security:
      - bearerAuth: []
  areas:
    default:
      path_patterns:
        - ^/notification
        - ^/notification/health$
