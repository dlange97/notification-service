services:
  _defaults:
    autowire: true
    autoconfigure: true

  App\:
    resource: "../src/"
    exclude:
      - "../src/DependencyInjection/"
      - "../src/Entity/"
      - "../src/Kernel.php"

  App\Service\RequestAccessTemplateUpdater:
    arguments:
      $channelUpdaters:
        - '@App\Service\TemplateUpdate\InboxTemplateChannelUpdater'
        - '@App\Service\TemplateUpdate\EmailTemplateChannelUpdater'
        - '@App\Service\TemplateUpdate\PushTemplateChannelUpdater'
      $payloadNormalizer: '@App\Service\TemplateUpdate\TemplatePayloadNormalizer'

  App\Service\TemplateUpdate\TemplatePayloadNormalizer:
    arguments:
      $strategies:
        - '@App\Service\TemplateUpdate\ChannelsPayloadNormalizerStrategy'
        - '@App\Service\TemplateUpdate\LegacyFlatPayloadNormalizerStrategy'

  # ── Instance ID request listener ─────────────────────────
  App\EventListener\InstanceRequestListener:
    tags:
      - {
          name: kernel.event_listener,
          event: kernel.request,
          method: onKernelRequest,
          priority: 20,
        }

  # ── Instance ID Doctrine listener ────────────────────────
  App\EventListener\InstanceDoctrineListener:
    tags:
      - { name: doctrine.event_listener, event: prePersist }

  # ── Rate-limit subscriber (DDoS / brute-force protection) ─
  App\EventSubscriber\RateLimitSubscriber:
    arguments:
      $apiLimiter: "@limiter.api"
      $apiSensitiveLimiter: "@limiter.api_sensitive"
    tags:
      - { name: kernel.event_subscriber }
